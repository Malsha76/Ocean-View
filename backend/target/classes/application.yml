spring:
  application:
    name: ocean-view-resort-api
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/oceanview}
      auto-index-creation: true

server:
  port: ${PORT:8080}

# JWT
jwt:
  secret: ${JWT_SECRET:OceanViewResortSecretKeyForJWTTokenGenerationMinimum32Chars}
  expiration-ms: 86400000  # 24 hours

# CORS for React frontend
cors:
  allowed-origins: http://localhost:3000,http://localhost:5173

logging:
  level:
    com.oceanview: INFO
    org.springframework.security: INFO
